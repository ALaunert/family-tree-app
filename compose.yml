services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-family_tree}
      POSTGRES_USER: ${POSTGRES_USER:-family_tree}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-family_tree}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ./api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://family_tree:family_tree@db:5432/family_tree}
    ports:
      - "8000:8000"
    working_dir: /app
    volumes:
      - ./api:/app

  web:
    build:
      context: ./web
    ports:
      - "5173:5173"

volumes:
  postgres-data:

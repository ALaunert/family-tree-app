services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-family_tree}
      POSTGRES_USER: ${POSTGRES_USER:-family_tree}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-family_tree}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ./api
    depends_on:
      - db
    ports:
      - "8000:8000"

  web:
    build:
      context: ./web
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  postgres-data:

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-family_tree}
      POSTGRES_USER: ${POSTGRES_USER:-family_tree}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-family_tree}

  api:
    build:
      context: ./api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    working_dir: /app
    volumes:
      - ./api:/app

  web:
    build:
      context: ./web
    ports:
      - "5173:5173"
